services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "${AGENTTEX_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - AGENTTEX_REDIS_URL=redis://redis:6379/0
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    environment:
      - AGENTTEX_REDIS_URL=redis://redis:6379/0
    command: celery -A backend.app.tasks.celery_app worker --loglevel=info --concurrency=1
